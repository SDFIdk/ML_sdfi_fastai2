name: ML_sdfi
channels:
  - fastai
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.10
  - fastai
  - pytorch
  - geopandas
  - gdal
  - fiona
  - psutil
  - rasterio
  - torchvision
  - pytorch-cuda=12.1
  - setuptools<76
  - pip
  # Pip packages that need pkg_resources at build time are in requirements_pip.txt.
  # After env create run: mamba run -n ML_sdfi pip install --no-build-isolation -r requirements_pip.txt
  - pip:
      - psycopg2-binary
      - reportlab
